<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 18px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 12px; font-weight: 500; fill: #6b7280; }
    .nodeTitle { font-size: 13px; font-weight: 600; fill: #111827; }
    .nodeLabel { font-size: 11px; fill: #6b7280; }
    .groupTitle { font-size: 14px; font-weight: 700; fill: #111827; }
    .layerLabel { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; fill: #6b7280; }
    .arrowLabel { font-size: 10px; font-weight: 500; fill: #6b7280; }
    .legend { font-size: 11px; fill: #374151; }
  </style>

  <defs>
    <!-- 箭头标记 -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- 标题 -->
  <text x="600" y="35" text-anchor="middle" class="title">GREYHOUND Architecture Diagram</text>
  <text x="600" y="58" text-anchor="middle" class="subtitle">Master-Worker Hybrid Parallel Training System</text>

  <!-- ==================== MASTER NODE ==================== -->
  <rect x="40" y="90" width="480" height="560" rx="12" ry="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="280" y="120" text-anchor="middle" class="groupTitle">Master Node</text>

  <!-- Master Components Group -->
  <rect x="70" y="150" width="420" height="220" rx="8" ry="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="85" y="172" class="layerLabel">CORE COMPONENTS</text>

  <!-- Global Controller -->
  <rect x="90" y="195" width="120" height="60" rx="8" ry="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="220" text-anchor="middle" class="nodeTitle">Global</text>
  <text x="150" y="240" text-anchor="middle" class="nodeTitle">Controller</text>

  <!-- Global Analyzer -->
  <rect x="230" y="195" width="120" height="60" rx="8" ry="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="290" y="220" text-anchor="middle" class="nodeTitle">Global</text>
  <text x="290" y="240" text-anchor="middle" class="nodeTitle">Analyzer</text>

  <!-- Test Scheduler -->
  <rect x="370" y="195" width="120" height="60" rx="8" ry="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="430" y="220" text-anchor="middle" class="nodeTitle">Test</text>
  <text x="430" y="240" text-anchor="middle" class="nodeTitle">Scheduler</text>

  <!-- Redis State Store (cylinder shape) -->
  <text x="85" y="410" class="layerLabel">STATE STORE</text>
  <ellipse cx="280" cy="450" rx="80" ry="20" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <rect x="200" y="450" width="160" height="70" fill="#fef3c7" stroke="none"/>
  <line x1="200" y1="450" x2="200" y2="520" stroke="#d97706" stroke-width="1.5"/>
  <line x1="360" y1="450" x2="360" y2="520" stroke="#d97706" stroke-width="1.5"/>
  <ellipse cx="280" cy="520" rx="80" ry="20" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="280" y="475" text-anchor="middle" class="nodeTitle">Redis</text>
  <text x="280" y="495" text-anchor="middle" class="nodeLabel">State Store</text>

  <!-- Internal Master connections -->
  <line x1="150" y1="255" x2="150" y2="435" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="150" y="430" text-anchor="middle" class="arrowLabel">read/write</text>

  <line x1="290" y1="255" x2="290" y2="435" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="290" y="430" text-anchor="middle" class="arrowLabel">analysis</text>

  <line x1="430" y1="255" x2="430" y2="435" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="430" y="430" text-anchor="middle" class="arrowLabel">schedule</text>

  <!-- ==================== WORKER NODE ==================== -->
  <rect x="560" y="90" width="600" height="560" rx="12" ry="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="860" y="120" text-anchor="middle" class="groupTitle">Worker Node</text>

  <!-- Control Layer -->
  <rect x="590" y="150" width="540" height="140" rx="8" ry="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="605" y="172" class="layerLabel">CONTROL LAYER</text>

  <!-- Local Controller -->
  <rect x="610" y="195" width="160" height="60" rx="8" ry="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="690" y="220" text-anchor="middle" class="nodeTitle">Local</text>
  <text x="690" y="240" text-anchor="middle" class="nodeTitle">Controller</text>

  <!-- Local Analyzer -->
  <rect x="790" y="195" width="160" height="60" rx="8" ry="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="870" y="220" text-anchor="middle" class="nodeTitle">Local</text>
  <text x="870" y="240" text-anchor="middle" class="nodeTitle">Analyzer</text>

  <!-- Benchmark Executor -->
  <rect x="970" y="195" width="150" height="60" rx="8" ry="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="1045" y="220" text-anchor="middle" class="nodeTitle">Benchmark</text>
  <text x="1045" y="240" text-anchor="middle" class="nodeTitle">Executor</text>

  <!-- NCCL / CUDA Layer -->
  <rect x="590" y="310" width="540" height="140" rx="8" ry="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="605" y="332" class="layerLabel">NCCL / CUDA LAYER</text>

  <!-- GPU Monitor -->
  <rect x="650" y="355" width="200" height="60" rx="8" ry="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="750" y="380" text-anchor="middle" class="nodeTitle">GPU Monitor</text>
  <text x="750" y="400" text-anchor="middle" class="nodeLabel">Performance Metrics</text>

  <!-- NCCL Shim -->
  <rect x="870" y="355" width="240" height="60" rx="8" ry="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="990" y="380" text-anchor="middle" class="nodeTitle">NCCL Shim</text>
  <text x="990" y="400" text-anchor="middle" class="nodeLabel">LD_PRELOAD Hook</text>

  <!-- Training Framework -->
  <rect x="590" y="470" width="540" height="140" rx="8" ry="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="605" y="492" class="layerLabel">TRAINING FRAMEWORK</text>

  <!-- Megatron-LM -->
  <rect x="750" y="520" width="240" height="70" rx="8" ry="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="870" y="550" text-anchor="middle" class="nodeTitle">Megatron-LM</text>
  <text x="870" y="575" text-anchor="middle" class="nodeLabel">Parallel Training Engine</text>

  <!-- Worker internal connections -->
  <!-- LC -> LA -->
  <line x1="770" y1="225" x2="790" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="780" y="250" text-anchor="middle" class="arrowLabel">dispatch</text>

  <!-- LA -> GM -->
  <line x1="870" y1="255" x2="750" y2="350" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="810" y="300" text-anchor="middle" class="arrowLabel">collect</text>

  <!-- GM -> SHIM -->
  <line x1="850" y1="385" x2="870" y2="385" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="860" y="410" text-anchor="middle" class="arrowLabel">hook</text>

  <!-- SHIM -> Megatron -->
  <line x1="990" y1="415" x2="870" y2="515" stroke="#db2777" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="950" y="475" text-anchor="middle" class="arrowLabel">intercept</text>

  <!-- LC -> BE -->
  <line x1="690" y1="255" x2="690" y2="330" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowPurple)"/>
  <text x="680" y="295" text-anchor="middle" class="arrowLabel">execute</text>

  <!-- ==================== MASTER <-> WORKER 通信 ==================== -->
  <!-- Bidirectional Redis Pub/Sub -->
  <line x1="520" y1="370" x2="560" y2="370" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="560" y1="390" x2="520" y2="390" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Pub/Sub label -->
  <rect x="490" y="345" width="110" height="22" rx="4" ry="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="545" y="360" text-anchor="middle" class="arrowLabel" style="font-weight: 600;">Redis Pub/Sub</text>

  <!-- ==================== 图例 (Legend) ==================== -->
  <rect x="40" y="620" width="1120" height="60" rx="8" ry="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="642" class="legend" style="font-weight: 600;">Legend:</text>

  <!-- Control nodes -->
  <rect x="130" y="632" width="16" height="16" rx="3" ry="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="155" y="645" class="legend">Control</text>

  <!-- Analysis nodes -->
  <rect x="215" y="632" width="16" height="16" rx="3" ry="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="240" y="645" class="legend">Analysis</text>

  <!-- Storage nodes -->
  <rect x="315" y="632" width="16" height="16" rx="3" ry="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="340" y="645" class="legend">Storage</text>

  <!-- Compute nodes -->
  <rect x="415" y="632" width="16" height="16" rx="3" ry="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="440" y="645" class="legend">Compute</text>

  <!-- Framework nodes -->
  <rect x="515" y="632" width="16" height="16" rx="3" ry="3" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="540" y="645" class="legend">Framework</text>

  <!-- Layer boxes -->
  <rect x="635" y="632" width="24" height="16" rx="3" ry="3" fill="#ffffff" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="670" y="645" class="legend">Layer Group</text>

  <!-- Node groups -->
  <rect x="770" y="632" width="24" height="16" rx="3" ry="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="805" y="645" class="legend">Master</text>

  <rect x="865" y="632" width="24" height="16" rx="3" ry="3" fill="#faf5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="900" y="645" class="legend">Worker</text>

  <!-- Arrow types -->
  <line x1="960" y1="640" x2="995" y2="640" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="1000" y="645" class="legend">Data Flow</text>

  <line x1="1075" y1="640" x2="1110" y2="640" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGray)"/>
  <text x="1115" y="645" class="legend">Async</text>
</svg>
